services:
  db:
    image: postgres
    container_name: ${CONTAINER_NAME}
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata:
    name: ${VOLUME_NAME}
